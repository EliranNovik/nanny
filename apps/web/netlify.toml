[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[edge_functions]]
  function = "og-share"
  path = "/community/feed"

[[edge_functions]]
  function = "og-share"
  path = "/posts/*"

[[edge_functions]]
  function = "og-share"
  path = "/requests/*"
